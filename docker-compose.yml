services:
  php:
    image: php:8.2-apache
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: elektronik_shop
      TZ: Asia/Jakarta
    command: --default-time-zone='+07:00'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_elektro_shop.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: secret

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiMzM1ZTI2MDM0Nzg1N2Q1YzZiZDNlNzkzMWFmODdmOWUiLCJ0IjoiZjI4NmFkYjItMTM4Yy00Mjc1LWIyYWYtMTYyZjY0MGU1MzQzIiwicyI6Ik5qUmlaV1l5Wm1JdE5tWXhNUzAwTkRSbUxUZ3hOVFF0TWpFMU1tVm1Nalk1TkRCaCJ9
    depends_on:
      - php

volumes:
  db_data:
